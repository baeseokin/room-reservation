apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus:8080
      access: proxy
      isDefault: true
      editable: true
    - name: DS_PROMETHEUS
      type: prometheus
      url: http://prometheus:8080
      access: proxy
      editable: true
