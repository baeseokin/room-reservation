apiVersion: apps/v1
kind: Deployment
metadata:
  name: room-reservation-backend
  namespace: room-reservation   # 파일에 네임스페이스 고정하고 싶으면 주석 해제
spec:
  replicas: 1
  selector:
    matchLabels:
      app: room-reservation-backend
  template:
    metadata:
      labels:
        app: room-reservation-backend 
    spec:
      # 컨테이너는 1000:1000 권한으로 실행, 볼륨 그룹도 1000 적용
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: room-reservation-backend 
          image: baeseokin/room-reservation-backend:0.3
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: DB_HOST
              value: "mariadb-service.report"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "roomuser"
            - name: DB_PASSWORD
              value: "roompass"
            - name: DB_NAME
              value: "roomdb"
            - name: CORS_ORIGIN
              value: "http://localhost:30004,http://localhost:30003,http://localhost:5173"
---
apiVersion: v1
kind: Service
metadata:
  name: room-reservation-backend 
  namespace: room-reservation
spec:
  selector:
    app: room-reservation-backend 
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
      nodePort: 30003
  type: NodePort

